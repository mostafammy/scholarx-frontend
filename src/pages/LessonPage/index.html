<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Lesson Player</title>
    <link
      rel="stylesheet"
      href="https://cdn.plyr.io/3.7.8/plyr.css"
      integrity="sha384-wKE9pshxu8CQcCsaOY5J+5QjpXc0a2vTsMYlCwNux0oswl0ABHXJ11zrm/LFwPD7"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --plyr-color-main: #3b82f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #050505;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        overflow: hidden;
      }

      .player-wrapper {
        width: 100%;
        max-width: 1000px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 25px 65px rgba(0, 0, 0, 0.6);
        background: #000;
      }

      .plyr__video-wrapper {
        background: #000;
      }

      /* Overscan to push YT branding off-screen */
      .plyr__video-embed iframe {
        transform: scale(1.15);
        transform-origin: center;
        pointer-events: none;
      }

      .plyr--full-ui.plyr--video .plyr__control--overlaid {
        background: rgba(59, 130, 246, 0.92);
      }

      .plyr--full-ui.plyr--video .plyr__controls {
        padding: 0.75rem 1rem;
        backdrop-filter: blur(18px);
        background: rgba(10, 10, 10, 0.65);
      }

      .error-container {
        color: #f9fafb;
        text-align: center;
        background: #111827;
        padding: 2rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        width: min(420px, 90vw);
      }

      .error-container h3 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }

      .error-container p {
        margin: 0;
        color: #9ca3af;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="player-root" class="player-wrapper"></div>

    <script
      src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"
      integrity="sha384-ySmRexbAKNXAs+PxO4R1r7PNI+/qtm6e1RJxbBJOEn8CIij5Ekl7JXH2jfcbqgcl"
      crossorigin="anonymous"
    ></script>
    <script>
      (function initSecurePlayer() {
        const root = document.getElementById("player-root");
        const params = new URLSearchParams(window.location.search);
        const rawVideoId = params.get("video_id") || params.get("v");
        const videoId = getNormalizedVideoId(rawVideoId);

        if (!videoId) {
          root.innerHTML = `
                    <div class="error-container">
                        <h3>⚠️ Video Not Found</h3>
                        <p>Please provide a valid YouTube video identifier via ?video_id=XXXXX.</p>
                    </div>
                `;
          return;
        }

        root.innerHTML = `
                <div id="player" class="plyr__video-embed">
                    <iframe
                        src="https://www.youtube.com/embed/${videoId}?origin=${encodeURIComponent(
          window.location.origin
        )}&iv_load_policy=3&modestbranding=1&playsinline=1&showinfo=0&rel=0&enablejsapi=1"
                        allowfullscreen
                        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                        referrerpolicy="strict-origin-when-cross-origin"
                        title="Secure lesson player"
                    ></iframe>
                </div>
            `;

        const player = new Plyr("#player", {
          controls: [
            "play-large",
            "play",
            "progress",
            "current-time",
            "duration",
            "mute",
            "volume",
            "settings",
            "fullscreen",
          ],
          settings: ["quality", "speed"],
          youtube: {
            noCookie: true,
            rel: 0,
            showinfo: 0,
            iv_load_policy: 3,
            modestbranding: 1,
          },
          tooltips: { controls: true, seek: true },
        });

        document.addEventListener("contextmenu", (event) =>
          event.preventDefault()
        );

        window.addEventListener("keydown", (event) => {
          if (
            event.key === "F12" ||
            (event.ctrlKey &&
              event.shiftKey &&
              ["I", "J", "C", "U"].includes(event.key.toUpperCase()))
          ) {
            event.preventDefault();
          }
        });

        const analyticsEndpoint = "/api/clicks";
        root.addEventListener("click", (event) => {
          if (event.target.closest(".plyr__controls")) {
            return;
          }

          const payload = {
            videoId,
            timestamp: new Date().toISOString(),
            state: player.playing ? "playing" : "paused",
            progressSeconds: player.currentTime,
          };

          sendAnalytics(analyticsEndpoint, payload);
        });

        function getNormalizedVideoId(value) {
          if (!value) {
            return null;
          }
          const trimmed = value.trim();
          const directPattern = /^[a-zA-Z0-9_-]{11}$/;
          if (directPattern.test(trimmed)) {
            return trimmed;
          }
          const match = trimmed.match(
            /(?:youtu.be\/|v=|\/embed\/|\/v\/)([a-zA-Z0-9_-]{11})/
          );
          return match ? match[1] : null;
        }

        function sendAnalytics(endpoint, payload) {
          try {
            const body = JSON.stringify(payload);
            if (navigator.sendBeacon) {
              navigator.sendBeacon(endpoint, body);
              return;
            }
            fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body,
              keepalive: true,
            }).catch(() => {
              /* swallow network errors */
            });
          } catch (error) {
            /* intentionally ignored */
          }
        }
      })();
    </script>
  </body>
</html>
