name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # ── Install dependencies ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Build with Sentry source map upload ────────────────────────────────
      # All VITE_* vars are embedded into the bundle at build time.
      # SENTRY_* vars are used by sentryVitePlugin to upload source maps.
      - name: Build
        run: npm run build
        env:
          # ── App runtime config ──────────────────────────────────────────────
          VITE_API_URL: https://scholarx-backend-production-westeu.azurewebsites.net/api
          VITE_API_BASE_URL: https://scholarx-backend-production-westeu.azurewebsites.net/api

          # ── Sentry DSN (embedded into the JS bundle) ───────────────────────
          # Add secret: Settings → Secrets → Actions → VITE_SENTRY_DSN
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

          # ── Release tracking: links Sentry errors to the exact git commit ──
          VITE_APP_VERSION: ${{ github.sha }}

          # ── Sentry source map upload (used by sentryVitePlugin) ────────────
          # Add secrets: SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT
          # Generate auth token at: https://sentry.io/settings/account/api/auth-tokens/
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      # ── Clean workspace before Azure deploy ────────────────────────────────
      # Azure SWA scans the ENTIRE /github/workspace file count (not just dist/).
      # node_modules alone can exceed 100k files — far over Azure's limit.
      # The build is complete at this point; node_modules are no longer needed.
      - name: Clean workspace for deploy
        run: |
          # Remove source maps — Sentry already uploaded them above
          find dist -name "*.map" -delete
          echo "✅ Source maps stripped from dist/"

          # Copy SWA configuration so it is deployed with the pre-built output
          cp staticwebapp.config.json dist/
          echo "✅ SWA Configuration copied to dist/"

          # Remove node_modules — not needed after build, would blow Azure's file limit
          rm -rf node_modules
          echo "✅ node_modules removed"

          # Show what remains so we can confirm file counts in logs
          echo "📦 Files in dist/: $(find dist -type f | wc -l)"

      # ── Deploy pre-built dist to Azure Static Web Apps ─────────────────────
      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"           # Source root (used for routing config only)
          output_location: "dist"     # Use our pre-built output
          skip_app_build: true        # We built above — do not rebuild inside the action

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          action: "close"
